<svg viewBox="0 0 390 844" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,sans-serif">
  <defs>
    <linearGradient id="bgM" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0E1340"/>
      <stop offset="60%" stop-color="#0D0F14"/>
      <stop offset="100%" stop-color="#0A0C10"/>
    </linearGradient>
    <linearGradient id="arcM" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8B7FFF"/>
      <stop offset="100%" stop-color="#5A52E0"/>
    </linearGradient>
    <radialGradient id="glowM" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6C63FF" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#6C63FF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="390" height="844" fill="url(#bgM)"/>

  <!-- Status bar -->
  <text x="20" y="26" fill="#ffffff" font-size="13" font-weight="600">9:41</text>
  <rect x="320" y="16" width="3" height="6" rx="1" fill="#fff" opacity="0.4"/>
  <rect x="325" y="14" width="3" height="8" rx="1" fill="#fff" opacity="0.6"/>
  <rect x="330" y="12" width="3" height="10" rx="1" fill="#fff" opacity="0.8"/>
  <rect x="335" y="10" width="3" height="12" rx="1" fill="#fff"/>
  <path d="M347 20 Q352 15 357 20" stroke="#fff" stroke-width="1.5" fill="none" opacity="0.6"/>
  <path d="M344 23 Q352 13 360 23" stroke="#fff" stroke-width="1.5" fill="none" opacity="0.4"/>
  <circle cx="352" cy="24" r="1.5" fill="#fff"/>
  <rect x="365" y="14" width="18" height="10" rx="2" stroke="#fff" stroke-width="1.2" fill="none"/>
  <rect x="383" y="17" width="2" height="4" rx="1" fill="#fff" opacity="0.5"/>
  <rect x="366.5" y="15.5" width="12" height="7" rx="1.2" fill="#fff"/>

  <!-- Phase pill -->
  <rect x="125" y="50" width="140" height="30" rx="15" fill="#6C63FF" opacity="0.18"/>
  <rect x="125" y="50" width="140" height="30" rx="15" stroke="#6C63FF" stroke-width="1.2" fill="none"/>
  <circle cx="144" cy="65" r="4" fill="#6C63FF"/>
  <text x="198" y="70" fill="#9C95FF" font-size="12" font-weight="700" text-anchor="middle" letter-spacing="0.8">PHASE A · BREATHING</text>

  <!-- Step counter -->
  <text x="195" y="103" fill="#ffffff" font-size="12" text-anchor="middle" opacity="0.4" letter-spacing="0.5">STEP 3 / 10</text>

  <!-- Glow behind figure -->
  <ellipse cx="195" cy="310" rx="130" ry="130" fill="url(#glowM)"/>

  <!-- ===== PROFESSIONAL MINIMAL SILHOUETTE - Maya seated breathing ===== -->
  <g transform="translate(195, 310)">
    <!-- Breath rings (concentric expanding circles - breathing visual) -->
    <circle cx="0" cy="-35" r="28" fill="none" stroke="rgba(108,99,255,0.35)" stroke-width="1.5"/>
    <circle cx="0" cy="-35" r="48" fill="none" stroke="rgba(108,99,255,0.22)" stroke-width="1"/>
    <circle cx="0" cy="-35" r="70" fill="none" stroke="rgba(108,99,255,0.12)" stroke-width="1"/>

    <!-- Head (clean oval, single white fill) -->
    <ellipse cx="0" cy="-108" rx="19" ry="21" fill="rgba(255,255,255,0.88)"/>

    <!-- Neck -->
    <rect x="-7" y="-88" width="14" height="14" rx="4" fill="rgba(255,255,255,0.88)"/>

    <!-- Torso (slightly tapered rectangle) -->
    <path d="M-22 -75 Q-23 -30 -20 -5 L20 -5 Q23 -30 22 -75 Z" fill="rgba(255,255,255,0.85)"/>

    <!-- Arms raised (pure outline paths, no details) -->
    <path d="M-22 -65 Q-50 -75 -52 -100" stroke="rgba(255,255,255,0.85)" stroke-width="13" fill="none" stroke-linecap="round"/>
    <path d="M22 -65 Q50 -75 52 -100" stroke="rgba(255,255,255,0.85)" stroke-width="13" fill="none" stroke-linecap="round"/>

    <!-- Hands (small circles) -->
    <circle cx="-52" cy="-103" r="8" fill="rgba(255,255,255,0.8)"/>
    <circle cx="52" cy="-103" r="8" fill="rgba(255,255,255,0.8)"/>

    <!-- Cross-legged lower body (single merged blob shape) -->
    <path d="M-20 -5 Q-42 10 -38 38 Q-20 55 0 50 Q20 55 38 38 Q42 10 20 -5 Z" fill="rgba(255,255,255,0.78)"/>
  </g>

  <!-- Exercise name -->
  <text x="195" y="480" fill="#ffffff" font-size="23" font-weight="700" text-anchor="middle" letter-spacing="-0.3">Diaphragmatic Breathing</text>

  <!-- Instructions -->
  <text x="195" y="508" fill="#9C95FF" font-size="13" text-anchor="middle">Inhale 4 counts  ·  Exhale 6 counts</text>

  <!-- Divider -->
  <line x1="80" y1="528" x2="310" y2="528" stroke="#ffffff" stroke-width="0.5" opacity="0.08"/>

  <!-- Countdown timer -->
  <g transform="translate(195, 610)">
    <!-- Track circle -->
    <circle cx="0" cy="0" r="62" fill="none" stroke="rgba(108,99,255,0.12)" stroke-width="9"/>
    <!-- Progress arc (about 70% complete) -->
    <circle cx="0" cy="0" r="62" fill="none" stroke="url(#arcM)" stroke-width="9"
      stroke-dasharray="389.6" stroke-dashoffset="117" stroke-linecap="round"
      transform="rotate(-90)"/>
    <!-- Time label -->
    <text x="0" y="10" fill="#ffffff" font-size="36" font-weight="700" text-anchor="middle">42</text>
    <text x="0" y="28" fill="#9C95FF" font-size="11" text-anchor="middle" letter-spacing="0.5">SECONDS</text>
  </g>

  <!-- Pause button -->
  <rect x="155" y="702" width="80" height="46" rx="23" fill="#6C63FF"/>
  <rect x="183" y="719" width="6" height="12" rx="2" fill="#fff"/>
  <rect x="195" y="719" width="6" height="12" rx="2" fill="#fff"/>

  <!-- Skip button -->
  <text x="255" y="730" fill="#6C63FF" font-size="13" font-weight="600">Skip</text>
  <path d="M268 725 L276 729 L268 733" stroke="#6C63FF" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- Home bar -->
  <rect x="140" y="820" width="110" height="4" rx="2" fill="#fff" opacity="0.2"/>
</svg>
