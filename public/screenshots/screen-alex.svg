<svg viewBox="0 0 390 844" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,sans-serif">
  <defs>
    <linearGradient id="bgA" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0A2420"/>
      <stop offset="100%" stop-color="#0D0F14"/>
    </linearGradient>
    <linearGradient id="timerT" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00D4AA"/>
      <stop offset="100%" stop-color="#00957A"/>
    </linearGradient>
    <clipPath id="screenA"><rect width="390" height="844" rx="0"/></clipPath>
  </defs>

  <rect width="390" height="844" fill="url(#bgA)" clip-path="url(#screenA)"/>

  <!-- Status bar -->
  <text x="20" y="26" fill="#ffffff" font-size="13" font-weight="600">9:41</text>
  <rect x="320" y="16" width="3" height="6" rx="1" fill="#fff" opacity="0.4"/>
  <rect x="325" y="14" width="3" height="8" rx="1" fill="#fff" opacity="0.6"/>
  <rect x="330" y="12" width="3" height="10" rx="1" fill="#fff" opacity="0.8"/>
  <rect x="335" y="10" width="3" height="12" rx="1" fill="#fff"/>
  <path d="M348 20 Q353 15 358 20" stroke="#fff" stroke-width="1.5" fill="none" opacity="0.6"/>
  <path d="M345 23 Q353 13 361 23" stroke="#fff" stroke-width="1.5" fill="none" opacity="0.4"/>
  <circle cx="353" cy="24" r="1.5" fill="#fff"/>
  <rect x="366" y="14" width="18" height="10" rx="2" stroke="#fff" stroke-width="1.2" fill="none"/>
  <rect x="384" y="17" width="2" height="4" rx="1" fill="#fff" opacity="0.5"/>
  <rect x="367.5" y="15.5" width="12" height="7" rx="1.2" fill="#fff"/>

  <!-- Phase pill -->
  <rect x="130" y="52" width="130" height="28" rx="14" fill="#00D4AA" opacity="0.15"/>
  <rect x="130" y="52" width="130" height="28" rx="14" stroke="#00D4AA" stroke-width="1" fill="none"/>
  <text x="195" y="71" fill="#00D4AA" font-size="12" font-weight="600" text-anchor="middle" letter-spacing="1">PHASE B · POSTURE</text>

  <text x="195" y="105" fill="#ffffff" font-size="13" text-anchor="middle" opacity="0.5">Step 6 of 10</text>

  <!-- Trainer figure - Alex (male, posture correction pose) -->
  <g transform="translate(195, 295)">
    <circle cx="0" cy="0" r="100" fill="#00D4AA" opacity="0.04"/>
    <circle cx="0" cy="0" r="72" fill="#00D4AA" opacity="0.06"/>

    <!-- Head -->
    <ellipse cx="0" cy="-112" rx="21" ry="23" fill="#D4956A"/>
    <!-- Short hair -->
    <ellipse cx="0" cy="-126" rx="22" ry="12" fill="#1A0E08"/>
    <rect x="-22" y="-130" width="44" height="15" rx="8" fill="#1A0E08"/>
    <!-- Neck -->
    <rect x="-8" y="-90" width="16" height="18" rx="4" fill="#D4956A"/>
    <!-- Body - standing upright (posture correction) -->
    <path d="M-30 -72 Q-32 -20 -30 30 L30 30 Q32 -20 30 -72 Z" fill="#00957A"/>
    <!-- Arms by sides, elbows slightly bent for posture hold -->
    <path d="M-30 -65 Q-48 -50 -50 -20 Q-50 10 -40 20" stroke="#D4956A" stroke-width="14" fill="none" stroke-linecap="round"/>
    <path d="M30 -65 Q48 -50 50 -20 Q50 10 40 20" stroke="#D4956A" stroke-width="14" fill="none" stroke-linecap="round"/>
    <!-- Hands -->
    <ellipse cx="-40" cy="23" rx="9" ry="10" fill="#D4956A"/>
    <ellipse cx="40" cy="23" rx="9" ry="10" fill="#D4956A"/>
    <!-- Legs straight - standing -->
    <path d="M-30 30 L-22 110" stroke="#1A2E3A" stroke-width="22" fill="none" stroke-linecap="round"/>
    <path d="M30 30 L22 110" stroke="#1A2E3A" stroke-width="22" fill="none" stroke-linecap="round"/>
    <!-- Feet -->
    <ellipse cx="-21" cy="115" rx="14" ry="7" fill="#D4956A" transform="rotate(-5 -21 115)"/>
    <ellipse cx="21" cy="115" rx="14" ry="7" fill="#D4956A" transform="rotate(5 21 115)"/>

    <!-- Posture alignment line -->
    <line x1="0" y1="-130" x2="0" y2="120" stroke="#00D4AA" stroke-width="1.5" stroke-dasharray="5,4" opacity="0.5"/>
    <!-- Alignment dots -->
    <circle cx="0" cy="-112" r="3" fill="#00D4AA" opacity="0.8"/>
    <circle cx="0" cy="-72" r="3" fill="#00D4AA" opacity="0.8"/>
    <circle cx="0" cy="0" r="3" fill="#00D4AA" opacity="0.8"/>
    <circle cx="0" cy="60" r="3" fill="#00D4AA" opacity="0.8"/>
  </g>

  <text x="195" y="462" fill="#ffffff" font-size="22" font-weight="700" text-anchor="middle">Pelvic Tilt Correction</text>
  <text x="195" y="490" fill="#00D4AA" font-size="13" text-anchor="middle">Stand tall · Engage glutes · Hold</text>

  <!-- Circular timer -->
  <g transform="translate(195, 580)">
    <circle cx="0" cy="0" r="58" fill="none" stroke="#0A2420" stroke-width="8"/>
    <circle cx="0" cy="0" r="58" fill="none" stroke="url(#timerT)" stroke-width="8"
      stroke-dasharray="254" stroke-dashoffset="60" stroke-linecap="round"
      transform="rotate(-90)"/>
    <text x="0" y="8" fill="#ffffff" font-size="32" font-weight="700" text-anchor="middle">38</text>
    <text x="0" y="26" fill="#00D4AA" font-size="11" text-anchor="middle">seconds</text>
  </g>

  <rect x="145" y="676" width="100" height="48" rx="24" fill="#00D4AA"/>
  <rect x="186" y="693" width="5" height="14" rx="2" fill="#0D0F14"/>
  <rect x="199" y="693" width="5" height="14" rx="2" fill="#0D0F14"/>

  <rect x="140" y="820" width="110" height="4" rx="2" fill="#fff" opacity="0.25"/>
</svg>
