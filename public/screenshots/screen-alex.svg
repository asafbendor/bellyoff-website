<svg viewBox="0 0 390 844" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,sans-serif">
  <defs>
    <linearGradient id="bgA" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#071E1C"/>
      <stop offset="60%" stop-color="#0D0F14"/>
      <stop offset="100%" stop-color="#0A0C10"/>
    </linearGradient>
    <linearGradient id="arcA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00D4AA"/>
      <stop offset="100%" stop-color="#00957A"/>
    </linearGradient>
    <radialGradient id="glowA" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00D4AA" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#00D4AA" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="390" height="844" fill="url(#bgA)"/>

  <!-- Status bar -->
  <text x="20" y="26" fill="#ffffff" font-size="13" font-weight="600">9:41</text>
  <rect x="320" y="16" width="3" height="6" rx="1" fill="#fff" opacity="0.4"/>
  <rect x="325" y="14" width="3" height="8" rx="1" fill="#fff" opacity="0.6"/>
  <rect x="330" y="12" width="3" height="10" rx="1" fill="#fff" opacity="0.8"/>
  <rect x="335" y="10" width="3" height="12" rx="1" fill="#fff"/>
  <path d="M347 20 Q352 15 357 20" stroke="#fff" stroke-width="1.5" fill="none" opacity="0.6"/>
  <path d="M344 23 Q352 13 360 23" stroke="#fff" stroke-width="1.5" fill="none" opacity="0.4"/>
  <circle cx="352" cy="24" r="1.5" fill="#fff"/>
  <rect x="365" y="14" width="18" height="10" rx="2" stroke="#fff" stroke-width="1.2" fill="none"/>
  <rect x="383" y="17" width="2" height="4" rx="1" fill="#fff" opacity="0.5"/>
  <rect x="366.5" y="15.5" width="12" height="7" rx="1.2" fill="#fff"/>

  <!-- Phase pill -->
  <rect x="125" y="50" width="140" height="30" rx="15" fill="#00D4AA" opacity="0.14"/>
  <rect x="125" y="50" width="140" height="30" rx="15" stroke="#00D4AA" stroke-width="1.2" fill="none"/>
  <circle cx="144" cy="65" r="4" fill="#00D4AA"/>
  <text x="198" y="70" fill="#00D4AA" font-size="12" font-weight="700" text-anchor="middle" letter-spacing="0.8">PHASE B · POSTURE</text>

  <!-- Step counter -->
  <text x="195" y="103" fill="#ffffff" font-size="12" text-anchor="middle" opacity="0.4" letter-spacing="0.5">STEP 6 / 10</text>

  <!-- Glow behind figure -->
  <ellipse cx="195" cy="305" rx="120" ry="140" fill="url(#glowA)"/>

  <!-- ===== PROFESSIONAL MINIMAL SILHOUETTE - Alex standing posture ===== -->
  <g transform="translate(195, 305)">
    <!-- Posture alignment line (dashed, teal) -->
    <line x1="0" y1="-145" x2="0" y2="130" stroke="#00D4AA" stroke-width="1.5" stroke-dasharray="5,4" opacity="0.55"/>

    <!-- Alignment dots on key points -->
    <circle cx="0" cy="-128" r="4" fill="#00D4AA" opacity="0.9"/>
    <circle cx="0" cy="-78" r="4" fill="#00D4AA" opacity="0.9"/>
    <circle cx="0" cy="-10" r="4" fill="#00D4AA" opacity="0.9"/>
    <circle cx="0" cy="60" r="4" fill="#00D4AA" opacity="0.9"/>

    <!-- Head -->
    <ellipse cx="0" cy="-120" rx="18" ry="20" fill="rgba(255,255,255,0.88)"/>

    <!-- Neck -->
    <rect x="-6" y="-101" width="12" height="14" rx="4" fill="rgba(255,255,255,0.88)"/>

    <!-- Torso (solid rectangle, straight = good posture) -->
    <rect x="-20" y="-87" width="40" height="72" rx="8" fill="rgba(255,255,255,0.85)"/>

    <!-- Left arm (down at side) -->
    <path d="M-20 -80 L-24 20" stroke="rgba(255,255,255,0.85)" stroke-width="13" fill="none" stroke-linecap="round"/>
    <!-- Right arm (down at side) -->
    <path d="M20 -80 L24 20" stroke="rgba(255,255,255,0.85)" stroke-width="13" fill="none" stroke-linecap="round"/>

    <!-- Left hand -->
    <ellipse cx="-24" cy="25" rx="8" ry="9" fill="rgba(255,255,255,0.80)"/>
    <!-- Right hand -->
    <ellipse cx="24" cy="25" rx="8" ry="9" fill="rgba(255,255,255,0.80)"/>

    <!-- Left leg -->
    <path d="M-12 -15 L-12 100" stroke="rgba(255,255,255,0.85)" stroke-width="16" fill="none" stroke-linecap="round"/>
    <!-- Right leg -->
    <path d="M12 -15 L12 100" stroke="rgba(255,255,255,0.85)" stroke-width="16" fill="none" stroke-linecap="round"/>

    <!-- Feet (small ovals) -->
    <ellipse cx="-12" cy="106" rx="13" ry="7" fill="rgba(255,255,255,0.75)"/>
    <ellipse cx="12" cy="106" rx="13" ry="7" fill="rgba(255,255,255,0.75)"/>
  </g>

  <!-- Exercise name -->
  <text x="195" y="480" fill="#ffffff" font-size="23" font-weight="700" text-anchor="middle" letter-spacing="-0.3">Pelvic Tilt Correction</text>

  <!-- Instructions -->
  <text x="195" y="508" fill="#00D4AA" font-size="13" text-anchor="middle">Stand tall  ·  Engage glutes  ·  Hold</text>

  <!-- Divider -->
  <line x1="80" y1="528" x2="310" y2="528" stroke="#ffffff" stroke-width="0.5" opacity="0.08"/>

  <!-- Countdown timer -->
  <g transform="translate(195, 610)">
    <circle cx="0" cy="0" r="62" fill="none" stroke="rgba(0,212,170,0.12)" stroke-width="9"/>
    <circle cx="0" cy="0" r="62" fill="none" stroke="url(#arcA)" stroke-width="9"
      stroke-dasharray="389.6" stroke-dashoffset="78" stroke-linecap="round"
      transform="rotate(-90)"/>
    <text x="0" y="10" fill="#ffffff" font-size="36" font-weight="700" text-anchor="middle">38</text>
    <text x="0" y="28" fill="#00D4AA" font-size="11" text-anchor="middle" letter-spacing="0.5">SECONDS</text>
  </g>

  <!-- Pause button -->
  <rect x="155" y="702" width="80" height="46" rx="23" fill="#00D4AA"/>
  <rect x="183" y="719" width="6" height="12" rx="2" fill="#0D0F14"/>
  <rect x="195" y="719" width="6" height="12" rx="2" fill="#0D0F14"/>

  <!-- Skip button -->
  <text x="255" y="730" fill="#00D4AA" font-size="13" font-weight="600">Skip</text>
  <path d="M268 725 L276 729 L268 733" stroke="#00D4AA" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- Home bar -->
  <rect x="140" y="820" width="110" height="4" rx="2" fill="#fff" opacity="0.2"/>
</svg>
